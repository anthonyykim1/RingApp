name: RingApp
options:
  bundleIdPrefix: com.tonykim
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  RingApp:
    type: application
    platform: iOS
    sources:
      - RingApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tonykim.RingApp
        INFOPLIST_FILE: RingApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: RingApp/RingApp.entitlements
    dependencies:
      - target: NotificationService
  NotificationService:
    type: app-extension
    platform: iOS
    sources:
      - NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tonykim.RingApp.NotificationService
        INFOPLIST_FILE: NotificationService/Info.plist
        CODE_SIGN_ENTITLEMENTS: NotificationService/NotificationService.entitlements
